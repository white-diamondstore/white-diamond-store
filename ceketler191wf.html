<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Diamond | Koleksiyon</title>
    <style>
        :root { --gold: #c5a059; --dark: #121212; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f9f9f9; }
        nav { background: var(--dark); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .back-btn { color: var(--gold); text-decoration: none; font-weight: bold; border: 1px solid var(--gold); padding: 5px 12px; font-size: 0.8rem; }
        .container { padding: 10px; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .mini-card { background: white; border: 1px solid #eee; text-align: center; cursor: pointer; padding-bottom: 10px; }
        .mini-card img { width: 100%; height: 250px; object-fit: cover; }
        .mini-card h3 { font-size: 0.8rem; margin: 10px 5px 5px; text-transform: uppercase; }
        .mini-card .price { font-size: 0.9rem; font-weight: bold; color: var(--gold); }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { background: white; width: 95%; max-width: 500px; margin: 50px auto; position: relative; padding-bottom: 20px; }
        .close-modal { position: absolute; top: -40px; right: 10px; color: white; font-size: 30px; cursor: pointer; }
        .gallery-container { position: relative; width: 100%; height: 450px; overflow: hidden; }
        .image-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; height: 100%; scroll-behavior: smooth; }
        .image-gallery img { flex: 0 0 100%; width: 100%; object-fit: cover; }
        .image-gallery::-webkit-scrollbar { display: none; }
        .arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.7); border: none; padding: 10px; cursor: pointer; z-index: 10; border-radius: 50%; }
        .arrow-left { left: 10px; } .arrow-right { right: 10px; }
        .modal-info { padding: 20px; text-align: center; }
        .whatsapp-btn { display: block; background: var(--dark); color: var(--gold); text-decoration: none; padding: 15px; border: 1px solid var(--gold); font-weight: bold; margin-top: 15px; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

<nav><a href="index.html" class="back-btn">← ANA SAYFA</a></nav>

<div class="container">
    <div class="products-grid">
        
        <div class="mini-card" onclick="openProduct('modal191wf')">
            <img src="https://i.ibb.co/hFsFHQz0/4-195.jpg" alt="191wf">
            <h3>Şık İkili Takım</h3>
            <div class="price">2.300 TL</div>
            <span style="font-size: 0.7rem; color: #999;">Kodu: 191wf</span>
        </div>

    </div>
</div>

<div id="modal191wf" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeProduct('modal191wf')">&times;</span>
        
        <div class="gallery-container">
            <button class="arrow arrow-left" onclick="scrollGal(this, -1)">&#10094;</button>
            <div class="image-gallery">
                <img src="https://i.ibb.co/hFsFHQz0/4-195.jpg">
                <img src="https://i.ibb.co/QvF8G9cy/4-194.jpg">
                <img src="https://i.ibb.co/q3sCJvLq/4-193.jpg">
                <img src="https://i.ibb.co/7tD3F8sk/4-192.jpg">
                <img src="https://i.ibb.co/YBQJ4KRR/4-191.jpg">
            </div>
            <button class="arrow arrow-right" onclick="scrollGal(this, 1)">&#10095;</button>
        </div>

        <div class="modal-info">
            <h2>Zarif İkili Takım</h2>
            <p style="color: #888;">Ürün Kodu: 191wf</p>
            <p><b>Bedenler:</b> S - M - L - XL</p>
            <div style="font-size: 1.5rem; font-weight: bold;">2.300 TL</div>
            <a href="https://wa.me/905537853944?text=Merhaba, 191wf kodlu takımı sipariş etmek istiyorum." class="whatsapp-btn">WHATSAPP İLE SİPARİŞ VER</a>
        </div>
    </div>
</div>

<script>
    function openProduct(id) { document.getElementById(id).style.display = "block"; document.body.style.overflow = "hidden"; }
    function closeProduct(id) { document.getElementById(id).style.display = "none"; document.body.style.overflow = "auto"; }
    function scrollGal(btn, dir) {
        const gal = btn.parentElement.querySelector('.image-gallery');
        gal.scrollBy({ left: dir * gal.clientWidth, behavior: 'smooth' });
    }
</script>

</body>
</html>
