<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceket Koleksiyonu | White Diamond</title>
    <style>
        :root { --gold: #c5a059; --dark: #121212; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f4f4f4; color: var(--dark); }
        
        /* Navigation Simple */
        nav { background: var(--dark); padding: 15px; text-align: center; }
        .back-btn { color: var(--gold); text-decoration: none; font-weight: bold; font-size: 0.9rem; border: 1px solid var(--gold); padding: 5px 15px; }

        .header-title { text-align: center; padding: 40px 20px; background: white; margin-bottom: 30px; }
        .header-title h1 { margin: 0; font-size: 2rem; border-bottom: 2px solid var(--gold); display: inline-block; }

        .container { max-width: 1200px; margin: auto; padding: 0 15px; }

        /* Products Grid */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .product-card { background: white; border: 1px solid #ddd; overflow: hidden; transition: 0.3s; }
        
        /* Gallery System (Swipe) */
        .image-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; background: #eee; }
        .image-gallery img { flex: 0 0 100%; scroll-snap-align: start; height: 450px; object-fit: cover; }
        .image-gallery::-webkit-scrollbar { display: none; }

        .product-info { padding: 20px; text-align: center; }
        .product-name { font-size: 1.2rem; font-weight: 600; margin: 10px 0; }
        .beden { color: #666; font-size: 0.9rem; margin-bottom: 10px; }
        .price { font-size: 1.5rem; font-weight: bold; color: #000; margin-bottom: 15px; }

        .whatsapp-btn { 
            display: block; background: var(--dark); color: var(--gold); 
            text-decoration: none; padding: 12px; border: 1px solid var(--gold);
            font-weight: bold; text-transform: uppercase;
        }
        .whatsapp-btn:hover { background: var(--gold); color: white; }
        
        .swipe-info { font-size: 0.7rem; color: #aaa; margin: 5px 0; }

        footer { text-align: center; padding: 40px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn">← ANA SAYFA (الرئيسية)</a>
    </nav>

    <div class="header-title">
        <h1>Kadın Ceket Koleksiyonu</h1>
        <p>İstanbul'un en şık tasarımları</p>
    </div>

    <div class="container">
        <div class="products-grid">

            <div class="product-card">
                <div class="image-gallery">
                    <img src="https://i.ibb.co/sdSHBbsP/9-76.jpg" alt="Ceket 1">
                    <img src="https://i.ibb.co/jvjV9bRd/9-75.jpg" alt="Ceket 1 detay">
                </div>
                <div class="swipe-info">← Kaydırın (جر بصباعك) →</div>
                <div class="product-info">
                    <h3 class="product-name">Klasik Blazer Ceket</h3>
                    <p class="beden">Beden: S - M - L - XL</p>
                    <div class="price">2.415 TL</div>
                    <a href="https://wa.me/905537853944?text=Merhaba, Blazer Ceket siparişi vermek istiyorum." class="whatsapp-btn">Sipariş Ver</a>
                </div>
            </div>
            </div>
    </div>

    <footer>
        &copy; 2026 White Diamond Store | Istanbul
    </footer>

</body>
</html>
